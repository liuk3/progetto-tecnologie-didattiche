<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluedo Class - Ingresso</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-elements">
        <div class="bg-img footprints" style="top: 10%; left: 0%; transform: rotate(15deg);"></div>
        <div class="bg-img footprints" style="bottom: 10%; right: 0%; transform: rotate(-10deg);"></div>
        <div class="bg-img gloves" style="top: 20%; left: 5%; transform: rotate(45deg);"></div>
        <div class="bg-img gloves" style="top: 70%; left: 5%; transform: rotate(-30deg);"></div>
        <div class="bg-img gloves" style="top: 45%; right: 5%; transform: rotate(60deg);"></div>
        <div class="bg-img gloves" style="bottom: 10%; right: 5%; transform: rotate(-45deg);"></div>
        <div class="bg-img magnifying" style="top: 30%; left: 0%; transform: rotate(20deg);"></div>
        <div class="bg-img magnifying" style="top: 60%; left: 10%; transform: rotate(-25deg);"></div>
        <div class="bg-img magnifying" style="top: 15%; right: 0%; transform: rotate(35deg);"></div>
        <div class="bg-img magnifying" style="bottom: 25%; right: 10%; transform: rotate(-40deg);"></div>
        <div class="bg-img question" style="top: 40%; left: 2%; transform: rotate(35deg);"></div>
        <div class="bg-img question" style="top: 90%; left: 5%; transform: rotate(-15deg);"></div>
        <div class="bg-img question" style="top: 55%; right: 2%; transform: rotate(50deg);"></div>
        <div class="bg-img question" style="bottom: 35%; right: 5%; transform: rotate(-50deg);"></div>
        <div class="bg-img pin" style="top: 50%; left: 0%; transform: rotate(50deg);"></div>
        <div class="bg-img pin" style="top: 25%; left: 8%; transform: rotate(70deg);"></div>
        <div class="bg-img pin" style="bottom: 45%; right: 0%; transform: rotate(-60deg);"></div>
        <div class="bg-img notes" style="top: 25%; left: 0%; transform: rotate(-40deg);"></div>
        <div class="bg-img notes" style="top: 75%; left: 10%; transform: rotate(55deg);"></div>
        <div class="bg-img notes" style="bottom: 20%; right: 0%; transform: rotate(-25deg);"></div>
    </div>
    <div class="login-container">
        <h1>Indagine in Corso 🕵️‍♂️</h1>
        <p>Scegliete il nome della vostra squadra e l'icona per iniziare la gara.</p>
        
        <input type="text" id="teamName" placeholder="Nome Squadra..." required>
        
        <div class="icon-selector" id="iconSelector">
            {% for icon in valid_icons %}
            <div class="icon-option{% if loop.first %} selected{% endif %}" data-icon="{{ icon }}">{{ icon }}</div>
            {% endfor %}
        </div>

        <button onclick="joinGame()">Inizia l'Indagine!</button>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
